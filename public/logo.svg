<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#065f46"/>
      <stop offset="100%" style="stop-color:#047857"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="url(#bgGrad)"/>

  <!-- Subtle geometric pattern -->
  <g opacity="0.06" stroke="white" stroke-width="1" fill="none">
    <path d="M256 80L432 256L256 432L80 256Z"/>
    <circle cx="256" cy="256" r="120"/>
  </g>

  <!-- Bold "IW" monogram -->
  <text x="256" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="200" letter-spacing="-8">
    <tspan fill="#f59e0b">I</tspan><tspan fill="white">W</tspan>
  </text>

  <!-- Gold diamond accent above -->
  <polygon points="256,85 272,105 256,125 240,105" fill="#f59e0b" opacity="0.9"/>

  <!-- Brand name -->
  <text x="256" y="400" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="48" fill="white" letter-spacing="2">
    <tspan fill="#f59e0b">Ihsan</tspan><tspan fill="white">Wealth</tspan>
  </text>

  <!-- Arabic -->
  <text x="256" y="445" text-anchor="middle" font-family="'Amiri', serif" font-size="30" fill="#d4a853" opacity="0.6">
    إحسان الثروة
  </text>
</svg>
